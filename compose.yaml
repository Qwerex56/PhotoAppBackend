version: '3.9'

services:
  # PostgreSQL Database - Shared by AuthService and UserManagementService
  postgres:
    image: postgres:16-alpine
    container_name: photoapp_postgres
    environment:
      POSTGRES_DB: photoapp
      POSTGRES_USER: photoapp_user
      POSTGRES_PASSWORD: photoapp_secure_password_123!
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - photoapp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoapp_user -d photoapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"

  # RabbitMQ - Message Broker for Inter-Service Communication
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: photoapp_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: photoapp_user
      RABBITMQ_DEFAULT_PASS: photoapp_secure_password_123!
      RABBITMQ_DEFAULT_VHOST: /photoapp
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - photoapp_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache and Session Store
  redis:
    image: redis:7-alpine
    container_name: photoapp_redis
    command: redis-server --appendonly yes --requirepass photoapp_secure_password_123!
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - photoapp_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  photoapp_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local